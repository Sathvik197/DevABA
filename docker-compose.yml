

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  blog-net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: blog-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     blog
      POSTGRES_PASSWORD: blog123
      POSTGRES_DB:       blogdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [blog-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    container_name: blog-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://blog:blog123@db:5432/blogdb
    depends_on:
      db:
        condition: service_healthy
    networks: [blog-net]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: production
    container_name: blog-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks: [blog-net]
    ports:
      - "80:80"

# ── Dev override: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
